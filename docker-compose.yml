services:
  notifications-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudgames-notifications
    ports:
      - "5056:5056"  # Host 5056 -> Container 5055
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5056"

      # Configurações para conectar no RabbitMQ que já está rodando
      RabbitMq__HostName: "rabbitmq" # Nome do container na outra stack
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      RabbitMq__ExchangeName: "cloudgames.topic"
      RabbitMq__QueueName: "notifications.queue"

      Secrets__Password: "TqgX6tPq1f5jLw9bC3yZk2uR8hV0nE6sQ4mD7pJ1cFo="

    networks:
      - cloudgames-network

# Configuração para usar a rede que já foi criada pelo outro projeto
networks:
  cloudgames-network:
    external: true

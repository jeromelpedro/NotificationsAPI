services:

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    networks:
      - cloudgames-network

  functions:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: azure-functions
    environment:    
      - AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDxIu1qJ7iZ2pZxg=;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      
      - RabbitMqConnection=amqp://guest:guest@cloudgames-rabbitmq:5672
      
      - RabbitMq__HostName=cloudgames-rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__UserName=guest
      - RabbitMq__Password=guest
      - RabbitMq__ExchangeName=cloudgames.topic

      - RabbitMq__QueueNameUserCreated=UserCreatedEvent
      - RabbitMq__QueueNamePaymentProcessed=PaymentProcessedEvent-Notifications
    ports:
      - "7071:80"
    depends_on:
      - azurite
    networks:
      - cloudgames-network

networks:
  cloudgames-network:
    external: true
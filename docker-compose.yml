services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    networks:
      - cloudgames-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  functions:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: azure-functions
    environment:
      RabbitMq__HostName: "cloudgames-rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      RabbitMq__ExchangeName: "cloudgames.topic"
      RabbitMq__QueueNameUserCreated: "UserCreatedEvent"
      RabbitMq__QueueNamePaymentProcessed: "PaymentProcessedEvent"
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tiqd7taqgEsS32/B+CIAqTm9Lw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      FUNCTIONS_WORKER_RUNTIME: "dotnet-isolated"
    ports:
      - "7071:80"
    depends_on:
      azurite:
        condition: service_healthy
    restart: on-failure
    networks:
      - cloudgames-network

networks:
  cloudgames-network:
    external: true